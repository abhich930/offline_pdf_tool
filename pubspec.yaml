name: offline_pdf_tool
description: Offline-first cross-platform PDF toolkit for desktop and mobile.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  collection: ^1.18.0
  path: ^1.9.0
  path_provider: ^2.1.3
  file_picker: ^8.1.2
  desktop_drop: ^0.5.0
  uuid: ^4.5.1
  syncfusion_flutter_pdf: ^33.2.8
  markdown: ^7.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
